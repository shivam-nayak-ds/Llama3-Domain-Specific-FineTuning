# ============================================================
# Training Configuration — Financial Analyst Llama-3 QLoRA
# ============================================================

model:
  base_model_id: "meta-llama/Llama-3.2-3B-Instruct"
  hf_token_env: "HF_TOKEN"                  # HuggingFace token env var
  torch_dtype: "bfloat16"                   # bfloat16 for T4 GPU
  device_map: "auto"

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"               # NormalFloat4 — best quality
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true           # Nested quantization

lora:
  r: 16                                     # LoRA rank
  lora_alpha: 32                            # Scaling factor
  target_modules:                           # Which layers to train
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"

data:
  primary_dataset: "gbharti/finance-alpaca"
  secondary_dataset: "virattt/financial-qa-10K"
  train_split: 0.9
  val_split: 0.1
  max_seq_length: 2048
  num_proc: 4                               # Parallel preprocessing workers
  seed: 42

training:
  output_dir: "./models/llama3-financial-analyst"
  num_train_epochs: 3
  per_device_train_batch_size: 2            # Kaggle T4 — keep low
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8           # Effective batch = 16
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.001
  fp16: false
  bf16: true
  max_grad_norm: 0.3
  logging_steps: 10
  eval_strategy: "steps"
  eval_steps: 100
  save_strategy: "steps"
  save_steps: 100
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  report_to: "wandb"                        # Experiment tracking
  run_name: "llama3-financial-qlora-v1"
  group_by_length: true                     # Speed optimization
  dataloader_num_workers: 2

sft:
  packing: false                            # No packing for QA format
  dataset_text_field: "text"

hub:
  push_to_hub: true
  hub_model_id: "llama3-financial-analyst"  # HuggingFace Hub repo
  hub_token_env: "HF_TOKEN"
